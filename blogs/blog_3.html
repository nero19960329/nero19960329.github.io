				<div class="article-body">
					<div>置顶按钮的测试页，只有电脑可见，用手机的朋友们也可以看看图。</div>
					<div>置顶控件默认是我自定义的位置，看不到控件可能因为处于页面顶端而导致的该控件不显示，尝试将向下滚滑轮。</div>
					<div>
						<button class="buttons" id="button-leftup" onclick="totop_leftup()">生成左上角置顶控件</button>
						<button class="buttons" id="button-leftdown" onclick="totop_leftdown()">生成左下角置顶控件</button>
						<button class="buttons" id="button-rightup" onclick="totop_rightup()">生成右上角置顶控件</button>
						<button class="buttons" id="button-rightdown" onclick="totop_rightdown()">生成右下角置顶控件</button>
						<button class="buttons" id="button-recover" onclick="totop_recover()">恢复到默认位置</button>
					</div>
					<div>
						x <input type="number" id="totop-x" min="0" style="width: 132px; margin-right: 21px;" value="0" />
						y <input type="number" id="totop-y" min="0" style="width: 132px; margin-right: 21px;" value="0" />
						<button id="button-xy" onclick="totop_xy()" style="margin-left: 0px;">指定x，y位置生成置顶控件</button>

		<script type="text/javascript" src="../js/backtotop.js"></script>
		<script type="text/javascript">
			var bttWidget = new BackToTop();
			bttWidget.init({Custom: "blogs"});

			console.log($(window).width() + ", " + $(window).height());

			function totop_xy() {
				var widget = new BackToTop();
				var left = $('#totop-x').attr('value');
				var top = $('#totop-y').attr('value');
				console.log(parseFloat(top));
				if (isNaN(parseFloat(top)) || isNaN(parseFloat(left))) {
					alert("输入数字格式有问题！");
					return;
				} else if (parseFloat(left) > $(window).width() - 50 || parseFloat(top) > $(window).height() - 50|| 
							parseFloat(left) < 0 || parseFloat(top) < 0) {
					alert("输入值超过范围！\nx: 0~" + ($(window).width() - 50) + "\ny: 0~" + ($(window).height() - 50));
					return;
				}
				$('.totop').remove();
				widget.init({x: left, y: top});
			}

			function totop_leftup() {
				$('.totop').remove();
				var widget = new BackToTop();
				widget.init({LeftUp: true});
			}

			function totop_leftdown() {
				$('.totop').remove();
				var widget = new BackToTop();
				widget.init({LeftDown: true});
			}

			function totop_rightup() {
				$('.totop').remove();
				var widget = new BackToTop();
				widget.init({RightUp: true});
			}

			function totop_rightdown() {
				$('.totop').remove();
				var widget = new BackToTop();
				widget.init({RightDown: true});
			}

			function totop_recover() {
				$('.totop').remove();
				var widget = new BackToTop();
				widget.init({Custom: "blogs"});
			}
		</script>
